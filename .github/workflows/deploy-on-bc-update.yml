name: Deploy BC Extensions on Update

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version that triggered this deployment'
        required: false
        default: 'manual'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: powershell
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber -Scope CurrentUser

      - name: Deploy all extensions to all environments
        shell: powershell
        env:
          BC_USERNAME:  ${{ secrets.BC_USERNAME }}
          BC_PASSWORD:  ${{ secrets.BC_PASSWORD }}
          BC_TENANT_ID: 93e723e3-01e7-4e97-99cf-13ddd492ed98
        run: |
          Write-Host "======================================================"
          Write-Host " Shelby BC Extensions - Deployment"
          Write-Host " BC Version : ${{ inputs.bc_version }}"
          Write-Host " Started    : $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC"
          Write-Host "======================================================"

          # Authenticate using M365 credentials (no admin consent needed)
          $authContext = New-BcAuthContext `
            -tenantId   $env:BC_TENANT_ID `
            -credential (New-Object System.Management.Automation.PSCredential(
                            $env:BC_USERNAME,
                            (ConvertTo-SecureString $env:BC_PASSWORD -AsPlainText -Force)
                        ))

          # Environments to deploy to - matches your launch.json
          $envNames = @('DEV', 'AMA_HIST', 'AMA')

          # Find all extension projects by locating every app.json in the repo
          $projects = Get-ChildItem -Path "." -Filter "app.json" -Recurse `
                      | Where-Object { $_.FullName -notlike "*\.git\*" }

          Write-Host "`nFound $($projects.Count) extension project(s):"
          $projects | ForEach-Object { Write-Host "  -> $($_.DirectoryName)" }

          $results = @()

          foreach ($envName in $envNames) {
            Write-Host "`n====== Deploying to: $envName ======"

            foreach ($project in $projects) {
              $projectDir = $project.DirectoryName
              $appJson    = Get-Content $project.FullName | ConvertFrom-Json
              $appName    = $appJson.name
              $appVersion = $appJson.version

              Write-Host "`n  App: $appName v$appVersion"

              # Find compiled .app file in project folder
              $appFile = Get-ChildItem -Path $projectDir -Filter "*.app" -Recurse `
                         | Select-Object -First 1

              if (-not $appFile) {
                Write-Warning "  No .app file found in $projectDir - skipping"
                $results += [PSCustomObject]@{
                  Env     = $envName
                  App     = $appName
                  Version = $appVersion
                  Status  = "Skipped - no .app file"
                }
                continue
              }

              try {
                Publish-BcContainerApp `
                  -authContext           $authContext `
                  -environment           $envName `
                  -appFile               $appFile.FullName `
                  -useDevEndpoint        $false `
                  -checkAlreadyInstalled $true

                Write-Host "  SUCCESS: $appName -> $envName"
                $results += [PSCustomObject]@{
                  Env     = $envName
                  App     = $appName
                  Version = $appVersion
                  Status  = "Success"
                }
              } catch {
                Write-Warning "  FAILED: $appName -> $envName"
                Write-Warning "  Error: $($_.Exception.Message)"
                $results += [PSCustomObject]@{
                  Env     = $envName
                  App     = $appName
                  Version = $appVersion
                  Status  = "Failed: $($_.Exception.Message)"
                }
              }
            }
          }

          # Print summary
          Write-Host "`n======================================================"
          Write-Host " Deployment Summary"
          Write-Host "======================================================"
          $results | ForEach-Object {
            Write-Host "  $($_.Env) | $($_.App) v$($_.Version) | $($_.Status)"
          }

          # Write GitHub Actions job summary (visible in Actions UI)
          "## Shelby BC Extension Deployment" | Out-File $env:GITHUB_STEP_SUMMARY
          "**BC Version:** ${{ inputs.bc_version }}" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "**Deployed:** $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| Environment | Extension | Version | Status |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|---|---|---|---|" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          $results | ForEach-Object {
            "| $($_.Env) | $($_.App) | $($_.Version) | $($_.Status) |" `
              | Out-File $env:GITHUB_STEP_SUMMARY -Append
          }

          # Fail job if any deployment failed
          if ($results | Where-Object { $_.Status -like "Failed*" }) {
            Write-Error "One or more deployments failed. Check the summary above."
            exit 1
          }
