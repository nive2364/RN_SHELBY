name: Deploy BC Extensions on Update

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version that triggered this deployment'
        required: false
        default: 'manual'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install BcContainerHelper
        shell: powershell
        run: |
          Install-Module BcContainerHelper -Force -AllowClobber -Scope CurrentUser

      - name: Deploy all extensions to all environments
        shell: powershell
        env:
          BC_USERNAME:  ${{ secrets.BC_USERNAME }}
          BC_PASSWORD:  ${{ secrets.BC_PASSWORD }}
          BC_TENANT_ID: 93e723e3-01e7-4e97-99cf-13ddd492ed98
        run: |
          Write-Host "======================================================"
          Write-Host " Shelby BC Extensions - Deployment"
          Write-Host " BC Version : ${{ inputs.bc_version }}"
          Write-Host " Started    : $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss') UTC"
          Write-Host "======================================================"

          # Authenticate using M365 credentials
          $authContext = New-BcAuthContext `
            -tenantId   $env:BC_TENANT_ID `
            -credential (New-Object System.Management.Automation.PSCredential(
                            $env:BC_USERNAME,
                            (ConvertTo-SecureString $env:BC_PASSWORD -AsPlainText -Force)
                        ))

          # Environments to deploy to
          $envNames = @('DEV', 'AMA_HIST', 'AMA')

          # Find all extension .app files in the repo
          $appFiles = Get-ChildItem -Path "." -Filter "*.app" -Recurse `
                      | Where-Object { $_.FullName -notlike "*\.git*" -and $_.FullName -notlike "*.alpackages*" }

          Write-Host "`nFound $($appFiles.Count) .app file(s):"
          $appFiles | ForEach-Object { Write-Host "  - $($_.Name)" }

          $results = @()

          foreach ($envName in $envNames) {
            Write-Host "`n====== Deploying to: $envName ======"

            foreach ($appFile in $appFiles) {
              Write-Host "`n  Deploying: $($appFile.Name)"

              try {
                Publish-BcContainerApp `
                  -authContext    $authContext `
                  -environment    $envName `
                  -appFile        $appFile.FullName `
                  -useDevEndpoint $false `
                  -syncMode       ForceSync `
                  -install        $true `
                  -upgrade        $true

                Write-Host "  Success: $($appFile.Name) -> $envName"
                $results += [PSCustomObject]@{
                  Env = $envName; App = $appFile.BaseName; Status = "Success"
                }
              } catch {
                $errMsg = $_.Exception.Message
                Write-Warning "  FAILED: $($appFile.Name) -> $envName"
                Write-Warning "  Error: $errMsg"
                $results += [PSCustomObject]@{
                  Env = $envName; App = $appFile.BaseName; Status = "Failed: $errMsg"
                }
              }
            }
          }

          # Write summary to GitHub Actions job summary
          "## Shelby BC Extensions - Deployment Results"       | Out-File $env:GITHUB_STEP_SUMMARY
          "**BC Version:** ${{ inputs.bc_version }}"           | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "**Time:** $(Get-Date -Format 'yyyy-MM-dd HH:mm') UTC" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          ""                                                   | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "| Environment | Extension | Status |"              | Out-File $env:GITHUB_STEP_SUMMARY -Append
          "|---|---|---|"                                      | Out-File $env:GITHUB_STEP_SUMMARY -Append
          $results | ForEach-Object {
            "| $($_.Env) | $($_.App) | $($_.Status) |" | Out-File $env:GITHUB_STEP_SUMMARY -Append
          }

          if ($results | Where-Object { $_.Status -like "Failed*" }) { exit 1 }
