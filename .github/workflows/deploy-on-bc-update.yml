name: Deploy BC Extensions on Update

on:
  workflow_dispatch:
    inputs:
      bc_version:
        description: 'BC version that triggered this deployment'
        required: false
        default: 'manual'
      environment:
        description: 'Environment to deploy to (DEV, AMA_HIST, AMA, or ALL)'
        required: false
        default: 'ALL'

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy extensions via BC Admin API
        shell: bash
        env:
          BC_USERNAME:  ${{ secrets.BC_USERNAME }}
          BC_PASSWORD:  ${{ secrets.BC_PASSWORD }}
          BC_TENANT_ID: 93e723e3-01e7-4e97-99cf-13ddd492ed98
          TARGET_ENV:   ${{ inputs.environment }}
        run: |
          echo "======================================================"
          echo " Shelby BC Extensions - Deployment"
          echo " BC Version  : ${{ inputs.bc_version }}"
          echo " Environment : $TARGET_ENV"
          echo " Started     : $(date -u)"
          echo "======================================================"

          # Step 1: Get access token using the BC Admin Center app ID
          BC_ADMIN_APP_ID="996def3d-b36c-4153-8607-a6fd3c01b89f"

          echo "Authenticating..."
          TOKEN_RESPONSE=$(curl -s -X POST \
            "https://login.microsoftonline.com/${BC_TENANT_ID}/oauth2/v2.0/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "grant_type=password" \
            -d "client_id=${BC_ADMIN_APP_ID}" \
            -d "username=${BC_USERNAME}" \
            -d "password=${BC_PASSWORD}" \
            -d "scope=https://api.businesscentral.dynamics.com/.default")

          TOKEN=$(echo "$TOKEN_RESPONSE" | jq -r '.access_token')

          if [ -z "$TOKEN" ] || [ "$TOKEN" = "null" ]; then
            echo "ERROR: Authentication failed."
            echo "Response: $TOKEN_RESPONSE"
            exit 1
          fi

          echo "Authentication successful."

          # Step 2: Determine environments
          if [ "$TARGET_ENV" = "ALL" ]; then
            ENVS="DEV AMA_HIST AMA"
          else
            ENVS="$TARGET_ENV"
          fi

          # Step 3: Define the 4 app files with their folder paths
          declare -A APP_FILES=(
            ["Bill of Lading"]="Bill of Lading_Canyon Rim Consulting_1.5.0.0 (7)/Canyon Rim Consulting_Bill of Lading_1.5.0.0.app"
            ["DefaultLocation"]="DefaultLocation_Canyon Rim Consulting_1.5.0.1/Canyon Rim Consulting_DefaultLocation_1.5.0.2.app"
            ["Item Page Extension"]="Item Page Extension_Canyon Rim Consulting - Randy Nivert_1.5.0.0/Canyon Rim Consulting - Randy Nivert_Item Page Extension_1.5.0.0.app"
            ["Shelby Inventory Detail"]="Shelby Inventory Detail_Canyon Rim Consultiong_1.0.0.1 (1)/Canyon Rim Consultiong_Shelby Inventory Detail_1.0.0.0.app"
          )

          BASE="https://api.businesscentral.dynamics.com/v2.0/${BC_TENANT_ID}/admin/v2.21/applications/BusinessCentral/environments"

          RESULTS=""

          for ENV_NAME in $ENVS; do
            echo ""
            echo "====== Deploying to: $ENV_NAME ======"

            for APP_NAME in "${!APP_FILES[@]}"; do
              APP_PATH="${APP_FILES[$APP_NAME]}"

              if [ ! -f "$APP_PATH" ]; then
                echo "  SKIPPED: $APP_NAME - file not found at $APP_PATH"
                RESULTS+="$ENV_NAME|$APP_NAME|Skipped - file not found\n"
                continue
              fi

              echo "  Deploying: $APP_NAME"

              # Upload the .app file to BC environment
              HTTP_STATUS=$(curl -s -o /tmp/deploy_response.json -w "%{http_code}" \
                -X POST "$BASE/$ENV_NAME/apps" \
                -H "Authorization: Bearer $TOKEN" \
                -H "Content-Type: application/octet-stream" \
                --data-binary "@$APP_PATH")

              RESPONSE=$(cat /tmp/deploy_response.json)

              if [ "$HTTP_STATUS" = "200" ] || [ "$HTTP_STATUS" = "201" ] || [ "$HTTP_STATUS" = "202" ]; then
                echo "  Success: $APP_NAME -> $ENV_NAME (HTTP $HTTP_STATUS)"
                RESULTS+="$ENV_NAME|$APP_NAME|Success\n"
              else
                echo "  FAILED: $APP_NAME -> $ENV_NAME (HTTP $HTTP_STATUS)"
                echo "  Response: $RESPONSE"
                RESULTS+="$ENV_NAME|$APP_NAME|Failed: HTTP $HTTP_STATUS - $(echo $RESPONSE | jq -r '.message // .error // .')\n"
              fi
            done
          done

          # Write summary
          echo "## Shelby BC Extensions - Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "**BC Version:** ${{ inputs.bc_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** $TARGET_ENV" >> $GITHUB_STEP_SUMMARY
          echo "**Time:** $(date -u '+%Y-%m-%d %H:%M') UTC" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | Extension | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|---|" >> $GITHUB_STEP_SUMMARY
          echo -e "$RESULTS" | while IFS='|' read -r env app status; do
            [ -n "$env" ] && echo "| $env | $app | $status |" >> $GITHUB_STEP_SUMMARY
          done

          # Fail if any failed
          if echo -e "$RESULTS" | grep -q "Failed:"; then
            exit 1
          fi
